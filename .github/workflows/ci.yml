name: CI

# Runnable-verifiability proof for the one standalone-executable path (scripts/rss-ingest.py).
# A clean checkout installs pinned deps and runs the offline smoke test. The wider pipeline
# (Claude Code Agent Skills) is harness-bound and out of scope here — a stated limitation, by design.

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned dependencies
        run: pip install -r requirements.txt
      - name: Run smoke test
        run: python -m unittest discover -s tests -v
